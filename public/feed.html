<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0d0c">
  <title>Лента · SOKOLENOK</title>
  <!--OG-->
  <link rel="icon" href="/assets/logo-icon-dark.png" type="image/png">
  <link rel="stylesheet" href="/styles.css?v=1780154983">
  <style>
    /* Feed: narrow main column (like VK/Twitter) + sidebar on the right.
       max-width on the post column prevents the ugly "stretches to full screen" look. */
    .feed-grid {
      display: grid;
      grid-template-columns: minmax(0, 640px) 300px;
      gap: 24px;
      justify-content: center;
      align-items: start;
    }
    @media (max-width: 1000px) {
      .feed-grid { grid-template-columns: minmax(0, 640px); justify-content: center; }
    }
  </style>
</head>
<body data-page="feed">
<div class="layout">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main">
    <div class="main-top"></div>

    <div class="feed-head">
      <h1 class="feed-h1" id="feed-title">Лента</h1>
      <div class="feed-tabs" id="feed-tabs">
        <button class="feed-tab active" data-scope="all" type="button">Все</button>
        <button class="feed-tab" data-scope="subs" type="button">Подписки</button>
        <button class="feed-tab" data-scope="official" type="button">Официальные</button>
      </div>
    </div>

    <div class="feed-grid">
      <div id="feed-list">
        <div class="card"><div class="loading-inline"><div class="spinner sm"></div>Загружаем ленту…</div></div>
      </div>
      <aside id="feed-side">
        <div class="card"><div class="loading-inline"><div class="spinner sm"></div>Паблики…</div></div>
      </aside>
    </div>
  </main>
</div>
<div id="toast-host" class="toast-host"></div>
<script src="/app.js?v=1780154983"></script>
</body>
</html>
