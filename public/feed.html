<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0d0c">
  <title>Лента · SOKOLENOK</title>
  <link rel="icon" href="/assets/logo-icon-dark.png" type="image/png">
  <link rel="stylesheet" href="/styles.css?v=1779803314">
  <style>
    .feed-grid { display: grid; grid-template-columns: minmax(0,1fr) 300px; gap: 20px; align-items: start; }
    @media (max-width: 1000px) { .feed-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body data-page="feed">
<div class="layout">
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main">
    <div class="main-top"></div>

    <div class="eyebrow"><span class="dot"></span>Лента</div>
    <h1 class="page-title" id="feed-title">Лента</h1>
    <p class="page-sub">Официальные новости CS2 и обновления пабликов, на которые вы подписаны.</p>

    <!-- Scope tabs -->
    <div class="feed-tabs" id="feed-tabs">
      <button class="tab active" data-scope="all" type="button">Все</button>
      <button class="tab" data-scope="subs" type="button">Подписки</button>
      <button class="tab" data-scope="official" type="button">Официальные</button>
    </div>

    <div class="feed-grid">
      <div id="feed-list">
        <div class="card"><div class="loading-inline"><div class="spinner sm"></div>Загружаем ленту…</div></div>
      </div>
      <aside id="feed-side">
        <div class="card"><div class="loading-inline"><div class="spinner sm"></div>Паблики…</div></div>
      </aside>
    </div>
  </main>
</div>
<div id="toast-host" class="toast-host"></div>
<script src="/app.js?v=1779803314"></script>
</body>
</html>
