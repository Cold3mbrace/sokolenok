# ============================================================
# BOOTSTRAP config — HTTP only. Use this ONLY for the first run
# to obtain the initial Let's Encrypt certificate.
# After the cert exists, switch to nginx.conf (see DEPLOY.md).
# Replace YOUR_DOMAIN with your real domain.
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app:4173;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
