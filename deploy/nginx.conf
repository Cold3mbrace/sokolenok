# ============================================================
# SOKOLENOK / LUDIK — nginx reverse proxy
# Replace YOUR_DOMAIN below with your real domain (e.g. sokolenok.pro).
# For the very first run (before you have a certificate), use
# deploy/nginx-bootstrap.conf instead — see DEPLOY.md.
# ============================================================

# --- HTTP: serve ACME challenge, redirect everything else to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: the real site ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Reasonable modern TLS defaults
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Allow larger responses (inventories can be big)
    client_max_body_size 2m;

    location / {
        proxy_pass http://app:4173;
        proxy_http_version 1.1;

        # Pass the real host + scheme so the app builds correct Steam OpenID return URLs
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }
}
